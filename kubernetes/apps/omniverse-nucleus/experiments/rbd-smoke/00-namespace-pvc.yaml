---
apiVersion: v1
kind: Namespace
metadata:
  name: omniverse-nucleus-poc
  labels:
    app.kubernetes.io/name: omniverse-nucleus-poc
    scalex.io/purpose: rbd-smoke-test
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: default
  namespace: omniverse-nucleus-poc
  labels:
    app.kubernetes.io/name: omniverse-nucleus-poc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rbd-smoke
  namespace: omniverse-nucleus-poc
  labels:
    app.kubernetes.io/name: omniverse-nucleus-poc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: rook-ceph-block
  resources:
    requests:
      storage: 1Gi
