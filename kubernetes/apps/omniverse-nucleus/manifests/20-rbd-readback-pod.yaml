---
apiVersion: v1
kind: Pod
metadata:
  name: rbd-smoke-readback
  namespace: omniverse-nucleus-poc
  labels:
    app.kubernetes.io/name: omniverse-nucleus-poc
spec:
  serviceAccountName: default
  # Optional: set this when the scheduler is slow and the first smoke Pod used com3.
  # nodeName: com3
  restartPolicy: Never
  containers:
    - name: smoke
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          set -eux
          echo "--- readback ---"
          cat /data/created-at.txt
          echo "readback-at=$(date -Is)" >> /data/created-at.txt
          echo "--- after append ---"
          cat /data/created-at.txt
          df -h /data
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: rbd-smoke
