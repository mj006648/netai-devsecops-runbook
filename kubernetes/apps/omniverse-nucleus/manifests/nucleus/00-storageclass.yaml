---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: rook-ceph-block-nucleus-retain
  labels:
    app.kubernetes.io/name: omniverse-nucleus
    app.kubernetes.io/part-of: omniverse
    scalex.io/storage-purpose: nucleus
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    scalex.io/description: Nucleus dedicated RBD StorageClass with Retain reclaim policy
provisioner: rook-ceph.rbd.csi.ceph.com
parameters:
  clusterID: rook-ceph
  pool: replicapool
  imageFormat: "2"
  imageFeatures: layering
  csi.storage.k8s.io/fstype: ext4
  csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
  csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
  csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
  csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: Immediate
