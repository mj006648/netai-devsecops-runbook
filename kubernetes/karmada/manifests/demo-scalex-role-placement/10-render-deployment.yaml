apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-scalex-render-nginx
  namespace: demo-scalex-role
  labels:
    app: demo-scalex-render-nginx
    scalex.io/workload: render
spec:
  replicas: 4
  selector:
    matchLabels:
      app: demo-scalex-render-nginx
  template:
    metadata:
      labels:
        app: demo-scalex-render-nginx
        scalex.io/workload: render
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
