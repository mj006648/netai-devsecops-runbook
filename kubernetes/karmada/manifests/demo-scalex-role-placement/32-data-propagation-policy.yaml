apiVersion: policy.karmada.io/v1alpha1
kind: PropagationPolicy
metadata:
  name: demo-scalex-data-policy
  namespace: demo-scalex-role
spec:
  resourceSelectors:
    - apiVersion: apps/v1
      kind: Deployment
      name: demo-scalex-data-nginx
    - apiVersion: v1
      kind: Service
      name: demo-scalex-data-nginx
  placement:
    clusterAffinity:
      labelSelector:
        matchLabels:
          scalex.io/workload: data
    replicaScheduling:
      replicaSchedulingType: Divided
      replicaDivisionPreference: Weighted
      weightPreference:
        staticWeightList:
          - targetCluster:
              labelSelector:
                matchLabels:
                  scalex.io/workload: data
            weight: 1
