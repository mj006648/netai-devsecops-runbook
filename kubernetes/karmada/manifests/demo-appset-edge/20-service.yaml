apiVersion: v1
kind: Service
metadata:
  name: demo-appset-edge-nginx
  namespace: demo-appset-edge
  labels:
    app: demo-appset-edge-nginx
    scalex.io/demo: appset-edge
spec:
  type: ClusterIP
  selector:
    app: demo-appset-edge-nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
