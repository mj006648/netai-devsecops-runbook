apiVersion: batch/v1
kind: Job
metadata:
  name: demo-kueue-hold-b
  namespace: demo-kueue-datax
  labels:
    app.kubernetes.io/name: demo-kueue-datax
    kueue.x-k8s.io/queue-name: datax-user-queue
spec:
  parallelism: 1
  completions: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: hold
          image: nginx:1.27-alpine
          command:
            - /bin/sh
            - -c
            - sleep 600
          resources:
            requests:
              cpu: "1"
              memory: 64Mi
