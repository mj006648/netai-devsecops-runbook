apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: datax-default
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: datax-cpu-queue
spec:
  namespaceSelector:
    matchLabels:
      app.kubernetes.io/name: demo-kueue-datax
  resourceGroups:
    - coveredResources:
        - cpu
        - memory
      flavors:
        - name: datax-default
          resources:
            - name: cpu
              nominalQuota: "1"
            - name: memory
              nominalQuota: 256Mi
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: datax-user-queue
  namespace: demo-kueue-datax
spec:
  clusterQueue: datax-cpu-queue
