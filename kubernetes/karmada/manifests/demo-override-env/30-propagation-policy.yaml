apiVersion: policy.karmada.io/v1alpha1
kind: PropagationPolicy
metadata:
  name: demo-override-nginx-policy
  namespace: demo-override
spec:
  resourceSelectors:
    - apiVersion: apps/v1
      kind: Deployment
      name: demo-override-nginx
    - apiVersion: v1
      kind: Service
      name: demo-override-nginx
  placement:
    clusterAffinity:
      clusterNames:
        - twinx
        - edgex
        - datax
    replicaScheduling:
      replicaSchedulingType: Divided
      replicaDivisionPreference: Weighted
      weightPreference:
        staticWeightList:
          - targetCluster:
              clusterNames:
                - twinx
            weight: 1
          - targetCluster:
              clusterNames:
                - edgex
            weight: 1
          - targetCluster:
              clusterNames:
                - datax
            weight: 1
