apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-pool-fallback-rebalance-nginx
  namespace: demo-resource-pool-rebalance
  labels:
    app: demo-pool-fallback-rebalance-nginx
    scalex.io/workload: render-fallback-rebalance
spec:
  replicas: 5
  selector:
    matchLabels:
      app: demo-pool-fallback-rebalance-nginx
  template:
    metadata:
      labels:
        app: demo-pool-fallback-rebalance-nginx
        scalex.io/workload: render-fallback-rebalance
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
