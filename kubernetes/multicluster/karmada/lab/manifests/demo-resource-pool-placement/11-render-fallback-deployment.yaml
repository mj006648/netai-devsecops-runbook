apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-pool-render-fallback-nginx
  namespace: demo-resource-pool
  labels:
    app: demo-pool-render-fallback-nginx
    scalex.io/workload: render-fallback
spec:
  replicas: 5
  selector:
    matchLabels:
      app: demo-pool-render-fallback-nginx
  template:
    metadata:
      labels:
        app: demo-pool-render-fallback-nginx
        scalex.io/workload: render-fallback
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
