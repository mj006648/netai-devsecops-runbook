apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-weighted-nginx
  namespace: demo-weighted
  labels:
    app: demo-weighted-nginx
spec:
  replicas: 6
  selector:
    matchLabels:
      app: demo-weighted-nginx
  template:
    metadata:
      labels:
        app: demo-weighted-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
