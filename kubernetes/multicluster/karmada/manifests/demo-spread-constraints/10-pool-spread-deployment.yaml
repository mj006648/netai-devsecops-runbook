apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-spread-pool-nginx
  namespace: demo-spread-constraints
  labels:
    app: demo-spread-pool-nginx
    scalex.io/workload: pool-spread
spec:
  replicas: 8
  selector:
    matchLabels:
      app: demo-spread-pool-nginx
  template:
    metadata:
      labels:
        app: demo-spread-pool-nginx
        scalex.io/workload: pool-spread
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
          ports:
            - containerPort: 80
