apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-argocd-prune-rollback-nginx
  namespace: demo-argocd-prune-rollback
  labels:
    app: demo-argocd-prune-rollback-nginx
    scalex.io/workload: gitops-prune-rollback
spec:
  replicas: 4
  selector:
    matchLabels:
      app: demo-argocd-prune-rollback-nginx
  template:
    metadata:
      labels:
        app: demo-argocd-prune-rollback-nginx
        scalex.io/workload: gitops-prune-rollback
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
