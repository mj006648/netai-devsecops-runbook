apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-twinx-nginx
  namespace: demo-twinx
  labels:
    app: demo-twinx-nginx
    scalex.io/target: twinx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-twinx-nginx
  template:
    metadata:
      labels:
        app: demo-twinx-nginx
        scalex.io/target: twinx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
