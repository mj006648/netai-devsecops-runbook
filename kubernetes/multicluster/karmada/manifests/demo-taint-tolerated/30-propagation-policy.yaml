apiVersion: policy.karmada.io/v1alpha1
kind: PropagationPolicy
metadata:
  name: demo-taint-tolerated-nginx-policy
  namespace: demo-taint-tolerated
spec:
  resourceSelectors:
    - apiVersion: apps/v1
      kind: Deployment
      name: demo-taint-tolerated-nginx
    - apiVersion: v1
      kind: Service
      name: demo-taint-tolerated-nginx
  placement:
    clusterAffinity:
      clusterNames:
        - twinx
        - edgex
        - datax
    clusterTolerations:
      - key: scalex.io/maintenance
        operator: Equal
        value: "true"
        effect: NoExecute
    replicaScheduling:
      replicaSchedulingType: Divided
      replicaDivisionPreference: Weighted
      weightPreference:
        staticWeightList:
          - targetCluster:
              clusterNames:
                - twinx
            weight: 1
          - targetCluster:
              clusterNames:
                - edgex
            weight: 1
          - targetCluster:
              clusterNames:
                - datax
            weight: 1
